<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Speed Scrubber</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="wrapper">
    <video class="player__video" width="765" height="430" src="https://nnyagdev.org/wp-content/uploads/2021/01/sample-mp4-file.mp4" autoplay></video>
    <div class="controls">
		<progress id="progress_filled" value="0"></progress>
		<div class="toggle"><span id="play">►</span><span id="pause">❚ ❚</span></div>
		<input id="volume" type="range" min="0" max="100" step="1" oninput="setVolume(this.value)" onchange="setVolume(this.value)"></input>
      <div id="playbackSpeed">1×</div>
		<button id="rewind">« 10s</button>
		<button id="skip">25s »</button>
    </div>
  </div>

<script  src="script.js">
  //Your code goes here
	
</script>
</body>
</html>
